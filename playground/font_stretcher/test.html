<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Font Example</title>
    <style>
@font-face {
    font-family: "CustomFont";
    src: url("./out.ttf") format("truetype");
}

.box {
    width: 200px;
    height: 200px;
    background-color: aquamarine;
}
p {
    width: 100%;
    height: 100%;
    font-family: "CustomFont";
    background-color: aqua;
}
    </style>
</head>
<body>
    <div class="box">
        <p>This text will be displayed using the custom font.</p>
    </div>
</body>
</html>
